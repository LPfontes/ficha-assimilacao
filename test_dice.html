<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test 3D Dice Box</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #12161a;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    #dice-box-container {
      width: 100%;
      height: 70vh;
      border: 1px solid #333;
      background-color: #1a1f24;
      position: relative;
    }
    .controls {
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: var(--font-size-md);
      background-color: #00ff66;
      border: none;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Test 3D Dice Box (CDN)</h1>
  <div id="dice-box-container"></div>
  <div class="controls">
    <button id="roll-btn">Roll 1d6 + 1d10</button>
  </div>

  <script type="module">
    import DiceBox from "https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/dice-box.es.min.js";

    // Initialize Dice Box
    const box = new DiceBox({
      container: "#dice-box-container",
      assetPath: "assets/",
      origin: "https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/",
      theme: "default",
      themeColor: "#00ff66",
      offscreen: false // Force onscreen rendering for simplicity
    });

    box.init().then(() => {
      console.log("Dice Box is ready!");
      
      document.getElementById("roll-btn").addEventListener("click", () => {
        console.log("Rolling...");
        box.roll(["1d6", "1d10"]).then(results => {
          console.log("Roll results:", results);
          alert("Roll results: " + results.map(r => r.value).join(", "));
        });
      });
    }).catch(err => {
      console.error("Dice Box initialization error:", err);
    });
  </script>
</body>
</html>
